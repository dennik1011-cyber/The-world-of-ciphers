{% extends "base.html" %}
{% block title %}{{ level_name }}{% endblock %}

{% block content %}

<h1>{{ level_name }}</h1>

<div class="cipher-box">{{ cipher }}</div>

{% if result %}

<div class="result">{{ result }}</div>
<div class="correct">Правильный ответ: {{ correct }}</div>

<a href="/" class="menu-button">В меню</a>
<a href="/play/{{ level }}" class="menu-button">Продолжить</a>

{% else %}

<form method="POST">
    <input type="text" name="answer" placeholder="Введите ответ" required>
    <input type="hidden" name="original" value="{{ original }}">
    <input type="hidden" name="cipher" value="{{ cipher }}">
    <button type="submit">Проверить</button>
</form>

<a href="/help/{{ level }}" class="help-button">💡 Нужна помощь?</a>

{% endif %}

<a href="/" class="menu-button" style="margin-top: 10px;">В меню</a>

{% endblock %}
