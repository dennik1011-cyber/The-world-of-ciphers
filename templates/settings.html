{% extends "base.html" %}
{% block title %}Настройки{% endblock %}

{% block content %}

<h1>Настройки</h1>

<form method="POST">
    <div class="setting-box">
        Музыка
        <input type="checkbox" name="music" value="on"
               {{ 'checked' if request.cookies.get('music') == 'on' }}>
    </div>
    <div class="setting-box">
        Громкость
        <input type="range" name="volume" min="0" max="100"
               value="{{ request.cookies.get('volume', '75') }}">
    </div>
    <div class="setting-box">
        Тема интерфейса
        <select name="theme">
            <option value="light" {{
            'selected' if request.cookies.get('theme') == 'light' }}>Светлая</option>
            <option value="dark" {{
            'selected' if request.cookies.get('theme') == 'dark' }}>Тёмная</option>
        </select>
    </div>
    <div class="setting-box">
        Анимации
        <input type="checkbox" name="animations" value="on"
               {{ 'checked' if request.cookies.get('animations') == 'on' }}>
    </div>
    <div class="setting-box">
        Язык сайта
        <select name="language">
            <option value="ru" {{
            'selected' if request.cookies.get('language', 'ru') == 'ru' }}>Русский</option>
            <option value="en" {{
            'selected' if request.cookies.get('language') == 'en' }}>English</option>
        </select>
    </div>

    <button type="submit">Сохранить</button>
    <a href="/" class="menu-button">В меню</a>
</form>

{% endblock %}
